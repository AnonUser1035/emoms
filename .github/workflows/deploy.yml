name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm test

      # Vite inlines VITE_* vars at build time. The Worker URL is public (the
      # D1 database has no secrets to leak), so it's a repo Variable, not a
      # Secret. Set it in Settings → Secrets and variables → Actions →
      # Variables. If unset, the build still succeeds with the heatmap disabled.
      - run: npm run build
        env:
          VITE_CHECKIN_WORKER_URL: ${{ vars.VITE_CHECKIN_WORKER_URL }}

      # SPA fallback: deep links resolve to index.html instead of 404ing.
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
